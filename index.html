<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ميني سرفيس | Mini-services</title>

    <!-- خط كايرو المحلي / الأساسي -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="icon.png">

    <style>
        :root {
            --emerald: #38bdf8;
            --grass: #2563eb;
            --amber: #60a5fa;
            --royal: #1e3a8a;
            --teal: #0284c7;
        }

        html, body { 
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #0f172a; 
        }

        body {
            font-family: 'Cairo', sans-serif;
            color: #ffffff;
            -webkit-tap-highlight-color: transparent;
            overflow: auto;
        }

        .mesh-background {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -2;
            background: 
                radial-gradient(circle at 0% 0%, var(--emerald) 0%, transparent 55%),
                radial-gradient(circle at 100% 0%, var(--royal) 0%, transparent 55%),
                radial-gradient(circle at 100% 100%, var(--amber) 0%, transparent 55%),
                radial-gradient(circle at 0% 100%, var(--teal) 0%, transparent 55%),
                radial-gradient(circle at 50% 50%, var(--grass) 0%, transparent 55%);
            background-color: #0f172a;
            background-size: 200% 200%;
            animation: meshSwirl 15s ease-in-out infinite alternate;
        }

        @keyframes meshSwirl {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 50% 100%; }
        }

        .mesh-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            background: rgba(0, 0, 0, 0.2);
            pointer-events: none;
        }

        #root {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="mesh-background"></div>
    <div class="mesh-overlay"></div>
    <div id="root"></div>

    <!-- كود البداية المحلي المجمع عبر Vite -->
    <script type="module" src="/src/index.tsx"></script>
</body>
</html>
