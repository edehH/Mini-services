<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<script>
  window.addEventListener('error', function(e) {
    document.body.innerHTML = '<div style="color:#ff4444; background:#000; padding:20px; font-size:14px; word-break:break-all; position:fixed; top:0; left:0; width:100%; height:100%; z-index:999999; font-family:monospace;"><h2>❌ Top-Level JS Error:</h2><p>' + e.message + '</p><p><b>File:</b> ' + e.filename + ':' + e.lineno + '</p></div>';
  });
  window.addEventListener('unhandledrejection', function(e) {
    document.body.innerHTML = '<div style="color:#ffbb33; background:#000; padding:20px; font-size:14px; word-break:break-all; position:fixed; top:0; left:0; width:100%; height:100%; z-index:999999; font-family:monospace;"><h2>⚠️ Unhandled Promise Rejection:</h2><p>' + e.reason + '</p></div>';
  });
</script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

</head>
