name: Build Android APK
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. جلب الكود من المستودع
      - uses: actions/checkout@v4

      # 2. تهيئة بيئة Node.js و Java
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      # 3. تثبيت الاعتماديات مع أداة الأيقونات
      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/core@6.0.0 @capacitor/cli@6.0.0 @capacitor/android@6.0.0 @capacitor/assets --legacy-peer-deps

      # 4. التأكد من ضبط مسارات Vite للعمل داخل أندرويد
      - name: Ensure Vite Relative Base
        run: |
          cat << 'EOF' > vite.config.ts
          import path from 'path';
          import { defineConfig } from 'vite';
          import react from '@vitejs/plugin-react';

          export default defineConfig({
            base: './',
            plugins: [react()],
            resolve: {
              alias: {
                '@': path.resolve(__dirname, './src'),
              }
            }
          });
          EOF

      # 5. بناء ملفات الويب
      - name: Build Web App
        run: npm run build

      # 6. مزامنة الملفات مع مجلد أندرويد
      - name: Sync Capacitor Android
        run: |
          cat << 'EOF' > capacitor.config.json
          {
            "appId": "pro.miniservices.app",
            "appName": "Mini-services",
            "webDir": "dist",
            "server": {
              "androidScheme": "https"
            }
          }
          EOF
          npx cap sync android

      # 7. توليد الأيقونات (لحذف خطأ resource mipmap/ic_launcher not found)
      - name: Generate App Icons and Assets
        run: |
          mkdir -p assets
          [ -f icon.png ] && cp icon.png assets/icon.png || true
          [ -f logo.png ] && cp logo.png assets/logo.png || true
          [ -f background.png ] && cp background.png assets/splash.png || true
          [ -f background.png ] && cp background.png assets/splash-dark.png || true
          npx @capacitor/assets generate --android || true

      # 8. إصلاح إصدار أندرويد إلى API 35 (لحذف خطأ VANILLA_ICE_CREAM)
      - name: Upgrade Android Compile SDK to 35
        run: |
          sed -i 's/compileSdkVersion.*/compileSdkVersion 35/' android/app/build.gradle || true
          sed -i 's/targetSdkVersion.*/targetSdkVersion 35/' android/app/build.gradle || true

      # 9. بناء الـ APK عبر Gradle
      - name: Build APK with Gradle
        run: |
          cd android
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      # 10. رفع الملف النهائي
      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Mini-Services-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
